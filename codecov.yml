coverage:
  status:
    project:
      default:
        target: auto    # పాత కవరేజ్ కంటే తగ్గకూడదు
        threshold: 1%   # 1% వరకు ఫ్లక్చుయేషన్ ని అలో చేస్తుంది
    patch:
      default:
        target: 80%     # కొత్తగా యాడ్ చేసే ప్రతి ఫైల్ కి కనీసం 80% కవరేజ్ ఉండాలి
        threshold: 0%   # కొత్త ఫైల్స్ విషయంలో అస్సలు కాంప్రమైజ్ అవ్వదు