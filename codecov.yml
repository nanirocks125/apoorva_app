coverage:
  status:
    project:
      default:
        target: auto    # పాత కవరేజ్ కంటే తగ్గకూడదు
        threshold: 1%   # 1% వరకు ఫ్లక్చుయేషన్ ని అలో చేస్తుంది
    patch:
      default:
        target: 80%     # కొత్తగా యాడ్ చేసే ప్రతి ఫైల్ కి కనీసం 80% కవరేజ్ ఉండాలి
        threshold: 0%   # No Compromise: కొత్త కోడ్ కి కవరేజ్ తగ్గకూడదు

comment:
  layout: "diff, flags, files"
  behavior: default
  require_changes: false  # కవరేజ్ లో మార్పు లేకపోయినా రిపోర్ట్ చూపిస్తుంది