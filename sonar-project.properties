# Unique identifier for your project
sonar.projectKey=nanirocks125_apoorva_app
sonar.organization=manikanta-nandam

# Path to source and test directories
sonar.sources=lib
sonar.tests=test

# Encoding of the source code
sonar.sourceEncoding=UTF-8

# Paths to coverage reports (generated by 'flutter test --coverage')
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Exclude generated files (Common in Flutter: build_runner, etc.)
# 2. Exclusions: Ignore specific auto-generated files within 'lib'
sonar.exclusions=**/*.g.dart, \
                 **/*.freezed.dart, \
                 **/*.mocks.dart, \
                 lib/generated_plugin_registrant.dart, \
                 lib/generated/**

# 3. Platform Exclusions: Explicitly ignore native build artifacts
# This prevents the CSS/HTML errors you saw in android/build/
sonar.android.file.suffixes=.java,.kt
sonar.exclusions=android/**, ios/**, web/**, build/**, .dart_tool/**