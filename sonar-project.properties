# Unique identifier for your project
sonar.projectKey=nanirocks125_apoorva_app
sonar.organization=manikanta-nandam

# Path to source and test directories
sonar.sources=lib
sonar.tests=test

# Encoding of the source code
sonar.sourceEncoding=UTF-8

# Paths to coverage reports (generated by 'flutter test --coverage')
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Exclude generated files (Common in Flutter: build_runner, etc.)
sonar.exclusions=lib/**/*.g.dart, lib/**/*.freezed.dart, lib/generated_plugin_registrant.dart